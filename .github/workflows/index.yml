name: Process Posts with Dynamic Description

on:
  push:
    paths:
      - "posts/**"  # 监听 posts 目录下的变化
      - '.github/workflows/index.yml'  # 更新工作流时触发
  workflow_dispatch: # 支持手动触发

# 解决方案
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout 仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 安装依赖（需要 markdown 转 HTML 的工具，例如 `marked`）
      - name: Install dependencies
        run: |
          npm install marked

      # 扫描 posts 目录并生成 HTML 文件
      - name: Generate HTML with description and keywords
        run: |
          # 初始化 pages 目录
          mkdir -p pages

          # 获取子目录数量（文章数量）
          post_count=$(find posts -mindepth 1 -maxdepth 1 -type d | wc -l)
          echo "文章数量: $post_count"

          # 遍历每个子目录
          post_list=""
          post_dirs=()

          for dir in posts/*; do
            if [ -d "$dir" ]; then
              # 获取目录名称
              post_name=$(basename "$dir")

              # 获取目录的创建时间
              creation_time=$(stat -c '%w' "$dir" 2>/dev/null || stat -f '%B' "$dir" 2>/dev/null | xargs -I{} date -d @{} +"%Y-%m-%d %H:%M:%S")

              if [ -n "$creation_time" ] && [ "$creation_time" != '-' ]; then
                # 将目录名称和创建时间存储到数组中
                post_dirs+=("$creation_time $dir")
              fi
            fi
          done

          # 按创建时间排序
          sorted_dirs=$(for dir in "${post_dirs[@]}"; do echo "$dir"; done | sort)

          # 遍历排序后的目录，生成 HTML 文件
          for dir_with_time in $sorted_dirs; do
            # 获取目录名称和创建时间
            creation_time=$(echo "$dir_with_time" | cut -d' ' -f1)
            dir=$(echo "$dir_with_time" | cut -d' ' -f2-)
            post_name=$(basename "$dir")
            
            # 查找目录中的 Markdown 文件
            md_file=$(find "$dir" -name "*.md" | head -n 1)
            if [ -z "$md_file" ]; then
              echo "目录 $dir 中没有 Markdown 文件，跳过"
              continue
            fi

            # 生成描述：优先使用 description 文件内容
            description_file="$dir/description"
            if [ -f "$description_file" ]; then
              description=$(cat "$description_file" | tr '\n' ' ')
            else
              description=$(head -n 1 "$md_file" | tr '\n' ' ')
            fi
            if [ -z "$description" ]; then
              description="This is a blog post on $post_name."
            fi

            # 生成关键词（检查是否存在 keywords 文件）
            keywords_file="$dir/keywords"
            if [ -f "$keywords_file" ]; then
              keywords=$(cat "$keywords_file" | tr '\n' ',' | sed 's/,$//')
            else
              keywords="leekblog,leek"
            fi

            # 提取年月日
            date_part=$(echo "$creation_time" | awk '{print $1}')
            year=$(echo "$date_part" | cut -d'-' -f1)
            month=$(echo "$date_part" | cut -d'-' -f2)
            day=$(echo "$date_part" | cut -d'-' -f3)
            month="$month/$day"

            # 将 Markdown 转换为 HTML
            post_content=$(cat "$md_file" | npx marked)

            # 创建文章的 HTML 文件
            html_file="pages/${post_name}.html"
            echo "<!DOCTYPE html>
            <html lang='zh-CN'>
            <head>
              <meta charset='UTF-8'>
              <meta name='viewport' content='width=device-width, initial-scale=1.0'>
              <title>$post_name | leek</title>
              <link rel='stylesheet' href='/css/main.css'>
              <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
              <script src='/js/main.js' defer='defer'></script>
              <meta name='description' content='$description'>
              <meta name='keywords' content='$keywords'>
            </head>
            <body>
            <header>
              <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
              <p class='description'>我是一棵葱,站在风雨中</p>
              <hr>
            </header>
            <main>
            <h1>$post_name</h1><span>$year $month</span>
            $post_content
            </main>
            <footer>
            <a href='#'><span class='about'>about me</span></a>
            <br><br>
            <span>leek.blog &copy; 2024</span>
            </footer>
            </body>
            </html>" > "$html_file"
            echo "生成文章 HTML: $html_file"

            # 将文章链接添加到列表
            post_list="$post_list<a href='pages/${post_name}.html'><span>$post_name</span><span data-y='$year'>$month</span></a>"
          done
      # 生成 index.html 或分页文件
      - name: Generate index.html and paginate
        run: |
          # 生成 index.html 或分页文件
          page_file="index.html"
          echo "<!DOCTYPE html>
          <html lang='zh-CN'>
          <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <link rel='stylesheet' href='/css/main.css'>
            <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
            <meta name='description' content='leekblog,leek'>
            <meta name='keywords' content='leekblog,leek,blog'>
            <script src='/js/main.js' defer='defer'></script>
            <title>leek | blog</title>
          </head>
          <body>
          <header>
            <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
            <p class='description'>我是一棵葱,站在风雨中</p>
            <hr>
          </header>
          <main>
          $post_list
          </main>
          <footer>
            <a href='#'><span class='about'>about me</span></a>
            <br><br>
            <span>leek.blog &copy; 2024</span>
          </footer>
          </body>
          </html>" > "$page_file"
          echo "生成分页文件: $page_file"

          # 检查是否需要分页
          page_index=1
          items_per_page=10
          max_pages=$((($post_count + $items_per_page - 1) / $items_per_page))

          # 如果文章数目超过 10，则生成多个分页
          if [ $max_pages -gt 1 ]; then
            for ((i=1; i<=max_pages; i++)); do
              page_file="index${i}.html"
              echo "<!DOCTYPE html>
              <html lang='zh-CN'>
              <head>
                <meta charset='UTF-8'>
                <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                <link rel='stylesheet' href='/css/main.css'>
                <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
                <meta name='description' content='leekblog,leek'>
                <meta name='keywords' content='leekblog,leek,blog'>
                <script src='/js/main.js' defer='defer'></script>
                <title>leek | 第 $i 页</title>
              </head>
              <body>
              <header>
                <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                <p class='description'>我是一棵葱,站在风雨中</p>
                <hr>
              </header>
              <main>
              $(echo "$post_list" | sed -n "$(((i - 1) * $items_per_page + 1)),${i}*${items_per_page}p")
              </main>
              <div class='pagination'>
              $(if [ $i -gt 1 ]; then echo "<a href='index$((i - 1)).html'>Prev</a>"; fi)
              $(seq 1 $max_pages | awk -v i=$i '{if ($1 == i) print "<span>"$1"</span>"; else print "<a href=\"index"$1".html\">"$1"</a>"}')
              $(if [ $i -lt $max_pages ]; then echo "<a href='index$((i + 1)).html'>Next</a>"; fi)
              </div>
              <footer>
              <a href='#'><span class='about'>about me</span></a>
              <br><br>
              <span>leek.blog &copy; 2024</span>
              </footer>
              </body>
              </html>" > "$page_file"
              echo "生成分页文件: $page_file"
            done
          fi

        # 提交生成的 HTML 文件
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/*.html index*.html
          git commit -m "Update pages and index files with description and keywords"
          git push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}