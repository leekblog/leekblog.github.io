name: Get Post Directory Creation Time

on:
  push:
    branches:
      - main

jobs:
  get_creation_time:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Get creation time of the posts directory
        run: |
          # 获取 posts 目录的创建时间
          creation_time=$(stat --format='%W' posts)
          
          # 如果创建时间不可用，stat命令会返回0，表示无法获取
          if [ "$creation_time" -eq 0 ]; then
            echo "Unable to fetch creation time of the posts directory."
          else
            echo "The creation time of the posts directory is: $(date -d @$creation_time)"
          fi