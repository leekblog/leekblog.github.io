name: Process Posts with Dynamic Description

on:
  push:
    paths:
      - "posts/**"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout 仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 安装依赖
      - name: Install dependencies
        run: |
          npm install marked

      # 扫描 posts 目录并生成 HTML 文件
      - name: Generate HTML with sorted posts
        run: |
          # 初始化 pages 目录
          mkdir -p pages

          # 初始化一个数组保存子目录信息
          declare -A post_data
          declare -a sorted_posts

          # 遍历每个子目录
          for dir in posts/*; do
            if [ -d "$dir" ]; then
              # 获取文章名称（目录名）
              post_name=$(basename "$dir")

              # 获取目录的创建时间（Unix 时间戳）
              creation_time=$(stat -c '%W' "$dir" 2>/dev/null || stat -f '%B' "$dir" 2>/dev/null)

              # 如果创建时间无效，使用当前时间代替
              if [ -z "$creation_time" ] || [ "$creation_time" -le 0 ]; then
                creation_time=$(date +%s)
              fi

              # 保存目录名和创建时间
              post_data["$dir"]="$creation_time:$post_name"
            fi
          done

          # 对目录进行排序（按创建时间降序）
          sorted_posts=$(for key in "${!post_data[@]}"; do
            echo "${post_data[$key]}:$key"
          done | sort -t':' -k1,1nr)

          # 初始化分页变量
          page_index=1
          items_per_page=19
          post_list=""
          index_count=0
          index_0=false

          # 遍历排序后的目录生成 HTML
          for item in $sorted_posts; do
            creation_time=$(echo "$item" | cut -d':' -f1)
            post_name=$(echo "$item" | cut -d':' -f2)
            dir=$(echo "$item" | cut -d':' -f3)

            # 查找目录中的 Markdown 文件
            md_file=$(find "$dir" -name "*.md" | head -n 1)
            if [ -z "$md_file" ]; then
              echo "目录 $dir 中没有 Markdown 文件，跳过"
              continue
            fi

            # 生成描述：优先使用 description 文件内容
            description_file="$dir/description"
            if [ -f "$description_file" ]; then
              description=$(cat "$description_file" | tr '\n' ' ')
            else
              # 如果 description 文件不存在，提取 Markdown 前 1 行
              description=$(head -n 1 "$md_file" | tr '\n' ' ')
              description=$(echo "$description" | npx marked)
            fi
            if [ -z "$description" ]; then
              description="This is a blog post on $post_name."
            fi

            # 将 Markdown 转换为 HTML
            post_content=$(cat "$md_file" | npx marked)

            # 创建文章的 HTML 文件
            html_file="pages/${post_name}.html"
            echo "<!DOCTYPE html>
            <html lang='zh-CN'>
            <head>
              <meta charset='UTF-8'>
              <meta name='viewport' content='width=device-width, initial-scale=1.0'>
              <title>$post_name | leek</title>
              <link rel='stylesheet' href='/css/main.css'>
              <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
              <script src='/js/main.js' defer='defer'></script>
              <meta name='description' content='$description'>
              <meta name='keywords' content='leekblog,leek'>
            </head>
            <body>
            <header>
              <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
              <p class='description'>我是一棵葱,站在风雨中</p>
              <hr>
            </header>
            <main>
              <h1>$post_name</h1><span>$(date -d @$creation_time +"%Y") $(date -d @$creation_time +"%m/%d")</span>
              $post_content
            </main>
            <footer>
              <a href='#'><span class='about'>about me</span></a>
              <br><br>
              <span>leek.blog &copy; 2024</span>
            </footer>
            </body>
            </html>" > "$html_file"
            echo "生成文章 HTML: $html_file"

            # 添加到 post_list
            post_list="$post_list<a href='pages/${post_name}.html'><span>$post_name</span><span data-y='$(date -d @$creation_time +"%Y")'>$(date -d @$creation_time +"%m/%d")</span></a>"

            # 分页处理
            if [ $((index_count % items_per_page)) -eq 0 ] && [ $index_count -gt 0 ]; then
              page_file="index${page_index}.html"
              echo "<!DOCTYPE html>
              <html lang='zh-CN'>
              <head>
                <meta charset='UTF-8'>
                <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                <link rel='stylesheet' href='/css/main.css'>
                <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
                <meta name='description' content='leekblog,leek'>
                <meta name='keywords' content='leekblog,leek,blog'>
                <script src='/js/main.js' defer='defer'></script>
                <title>leek | blog</title>
              </head>
              <body>
              <header>
                <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                <p class='description'>我是一棵葱,站在风雨中</p>
                <hr>
              </header>
              <main>
                $post_list
              </main>
              <footer>
                <a href='#'><span class='about'>about me</span></a>
                <br><br>
                <span>leek.blog &copy; 2024</span>
              </footer>
              </body>
              </html>" > "$page_file"
              echo "生成分页文件: $page_file"
              post_list="" # 重置 post_list
              page_index=$((page_index + 1))
            fi

            index_count=$((index_count + 1))
          done

          # 提交生成的 HTML 文件
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/*.html index*.html
          git commit -m "Update pages and index files with description and keywords"
          git push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
