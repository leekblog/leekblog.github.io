name: Process Posts with Dynamic Description

on:
  push:
    paths:
      - "posts/**" # 监听 posts 目录下的变化
  workflow_dispatch: # 支持手动触发

# 解决方案
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout 仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 安装依赖（需要 markdown 转 HTML 的工具，例如 `marked`）
      - name: Install dependencies
        run: |
          npm install marked

      # 扫描 posts 目录并生成 HTML 文件
      - name: Generate HTML with description and keywords
        run: |
          # 初始化 pages 目录
          mkdir -p pages

          # 获取子目录数量（文章数量）
          post_count=$(find posts -mindepth 1 -maxdepth 1 -type d | wc -l)
          echo "文章数量: $post_count"

          # 遍历每个子目录
          page_index=1
          items_per_page=9
          post_list=""
          index_count=0

          index_0=false

          for dir in posts/*; do
            if [ -d "$dir" ]; then
              # 获取文章名称（目录名）
              post_name=$(basename "$dir")

              # 查找目录中的 Markdown 文件
              md_file=$(find "$dir" -name "*.md" | head -n 1)
              if [ -z "$md_file" ]; then
                echo "目录 $dir 中没有 Markdown 文件，跳过"
                continue
              fi

              # 生成描述：优先使用 description 文件内容
              description_file="$dir/description"
              if [ -f "$description_file" ]; then
                description=$(cat "$description_file" | tr '\n' ' ')
              else
                # 如果 description 文件不存在，提取 Markdown 前 3 行
                description=$(head -n 3 "$md_file" | tr '\n' ' ')
              fi
              if [ -z "$description" ]; then
                description="This is a blog post on $post_name."
              fi

              # 生成关键词（检查是否存在 keywords 文件）
              keywords_file="$dir/keywords"
              if [ -f "$keywords_file" ]; then
                keywords=$(cat "$keywords_file" | tr '\n' ',' | sed 's/,$//')
              else
                keywords="leekblog,leek"
              fi

              # 解析日期文件（如果存在）
              date_file="$dir/date"
              if [ -f "$date_file" ]; then
                date_content=$(cat "$date_file" | tr -d '\n')
                year=$(echo "$date_content" | cut -d' ' -f1)
                month=$(echo "$date_content" | cut -d' ' -f2)
                echo "文章日期: 年份=$year, 月份=$month"
              else
                year="----"
                month="-/-"
                echo "目录 $dir 中没有 date 文件"
              fi

              # 将 Markdown 转换为 HTML
              post_content=$(cat "$md_file" | npx marked)

              # 创建文章的 HTML 文件
              html_file="pages/${post_name}.html"
              echo "<!DOCTYPE html>
              <html lang='zh-CN'>
              <head>
                <meta charset='UTF-8'>
                <title>$post_name | leek</title>
                <link rel='stylesheet' href='/css/main.css'>
                <link rel='shortcut icon' href='favicon.ico' type='image/x-icon'>
                <script src='/js/main.js' defer='defer'></script>
                <meta name='description' content='$description'>
                <meta name='keywords' content='$keywords'>
              </head>
              <body>
              <header>
                <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                <p class='description'>我是一棵葱,站在风雨中</p>
                <hr>
                </header>
                <main>
                <h1>$post_name</h1><span>$year $month</span>
                <p>$description</p>
                $post_content
                </main>
                <footer>
                <a href='#'><span class='about'>about me</span></a>
                <br><br>
                <span>leek.blog &copy; 2024</span>
                </footer>
              </body>
              </html>" > "$html_file"
              echo "生成文章 HTML: $html_file"

              # 添加到 post_list
              post_list="$post_list<a href='pages/${post_name}.html'><span>$post_name</span><span data-y='$year'>$month</span></a>"
            
              # 检查分页
              if [ $((index_count % items_per_page)) -eq 0 ] && [ $index_count -gt 0 ]; then
                if [ "$index_0" == "false" ]; then
                  page_file="index.html"
                  index_0=true
                else
                  page_file="index${page_index}.html"
                fi
                echo "<!DOCTYPE html>
                <html lang='zh-CN'>
                <head>
                <meta charset='UTF-8'>
                <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                <link rel='stylesheet' href='/css/main.css'>
                <link rel='shortcut icon' href='favicon.ico' type='image/x-icon'>
                <meta name="description" content="leekblog,leek">
                <meta name="keywords" content="leekblog,leek,blog">
                <script src='/js/main.js' defer='defer'></script>
                <title>leek | blog</title>
                </head>
                <body>
                <header>
                <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                <p class='description'>我是一棵葱,站在风雨中</p>
                <hr>
                </header>
                <main>
                $post_list
                </main>
                <div class='pagination'>
                $(if [ $page_index -gt 1 ]; then 
                if [ $page_index -eq 2 ]; then   echo "<a href='index.html'>Prev</a>"; else  echo "<a href='index$((page_index - 1)).html'>Prev</a>";  fi; fi)
                $(seq 1 $((page_index)) | awk '{print "<a href=\"index"$1".html\">"$1"</a>"}')
                $(if [ $((post_count / 10)) -ge $page_index ];then echo "<a href='index$((page_index + 1)).html'>Next</a>"; fi) 
                </div>
                <footer>
                <a href='#'><span class='about'>about me</span></a>
                <br><br>
                <span>leek.blog &copy; 2024</span>
                </footer>
                </body>
                </html>" > "$page_file"
                echo "生成分页文件: $page_file"
                post_list="" # 重置 post_list
                page_index=$((page_index + 1))
              fi

              index_count=$((index_count + 1))
            fi
          done

          # 处理最后一页
          if [ ! -z "$post_list" ]; then
            page_file="index${page_index}.html"
            echo "<!DOCTYPE html>
            <html lang='zh-CN'>
            <head>
            <meta charset='UTF-8'>
            <meta name='viewport' content='width=device-width, initial-scale=1.0'>
            <link rel='stylesheet' href='/css/main.css'>
            <link rel='shortcut icon' href='favicon.ico' type='image/x-icon'>
            <meta name="description" content="leekblog,leek">
            <meta name="keywords" content="leekblog,leek,blog">
            <script src='/js/main.js' defer='defer'></script>
            <title>leek | 第$page_index页</title>
            </head>
            <body>
            <header>
            <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
            <p class='description'>我是一棵葱,站在风雨中</p>
            <hr>
            </header>
            <main>
            $post_list
            </main>
            <div class='pagination'>
            $(if [ $page_index -gt 1 ]; then echo "<a href='index$((page_index - 1)).html'>Prev</a>"; fi)
            $(seq 1 $((page_index)) | awk '{print "<a href=\"index"$1".html\">"$1"</a>"}')
            $(if [ $((post_count / 10)) -ge $page_index ];then echo "<a href='index$((page_index + 1)).html'>Next</a>"; fi) 
            </div>
            <footer>
            <a href='#'><span class='about'>about me</span></a>
            <br><br>
            <span>leek.blog &copy; 2024</span>
            </footer>
            </body>
            </html>" > "$page_file"
            echo "生成分页文件: $page_file"
          fi

      # 提交生成的 HTML 文件
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/*.html index*.html
          git commit -m "Update pages and index files with description and keywords"
          git push
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
