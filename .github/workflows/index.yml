name: Blog Workflow

on:
  push:
    paths:
      - 'posts/**'
      - '.github/workflows/index.yml'

jobs:
  update_blog:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up environment
      run: |
        if [ ! -d "pages" ]; then
          mkdir pages
          echo 0 > pages/num
        fi
        
        TOTAL_ARTICLES=$(find pages -mindepth 1 -maxdepth 1 -type d | wc -l)
        NUM_ARTICLES=$(cat pages/num)

        OPERATION="no_change"
        HEADER="<html><head><title>Blog</title></head><body>"
        FOOTER="</body></html>"

        if [ "$TOTAL_ARTICLES" -gt "$NUM_ARTICLES" ]; then
          OPERATION="write"
        elif [ "$TOTAL_ARTICLES" -lt "$NUM_ARTICLES" ]; then
          OPERATION="delete"
        fi

        echo "Operation: $OPERATION"

    - name: Handle Delete Operation
      if: ${{ steps.set_env.outputs.operation == 'delete' }}
      run: |
        echo "Starting delete operation"

        # Loop through all files in pages directory
        for page in pages/*.html; do
          ARTICLE_NAME=$(basename "$page" .html)
          
          # Check if the article directory exists in posts
          if [ ! -d "posts/$ARTICLE_NAME" ]; then
            echo "Deleting article: $ARTICLE_NAME"
            
            # Delete the article HTML file from pages
            rm -f "pages/$ARTICLE_NAME.html"
            
            # Also remove the article entry from index.html
            sed -i "/$ARTICLE_NAME.html/d" pages/index.html
          else
            echo "Article $ARTICLE_NAME still exists in posts, skipping deletion."
          fi
        done

        # Optionally, remove index4.html if pagination is no longer needed
        if [ -f "pages/index4.html" ]; then
          echo "Deleting index4.html"
          rm -f "pages/index4.html"
        fi

    - name: Commit Changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add .
        git commit -m "Update blog articles"
        git push
