name: Get Last Commit Time of Files in Subdirectories of Posts

on:
  push:
    branches:
      - main

jobs:
  get_commit_times:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Get last commit time of files in subdirectories in the posts folder
        run: |

          # 获取 git 仓库中所有文件的最新修改时间
          git ls-tree -r --name-only HEAD | while read filename; do
            last_commit_time=$(git log -1 --pretty=format:"%ad" -- "$filename")
            echo "$last_commit_time $filename"
          done

          # 获取 git 仓库中所有文件的最初提交时间
          git ls-tree -r --name-only HEAD | while read filename; do
            first_commit_time=$(git log --reverse --pretty=format:"%ad" -- "$filename" | head -1)
            echo "$first_commit_time $filename"
          done