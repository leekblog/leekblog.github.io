name: Generate HTML files
 
on:
  push:
    paths:
      - 'posts/**'
 
jobs:
  generate-html:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
 
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
 
      - name: Install dependencies
        run: npm install markdown-it fs-extra
 
      - name: Generate HTML files
        run: node .github/scripts/generate-html.js
