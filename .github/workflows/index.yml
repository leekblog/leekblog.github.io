name: Process Posts with Dynamic Description

on:
  push:
    paths:
      - "posts/**" # 监听 posts 目录变化
      - ".github/workflows/index.yml" # 更新工作流时触发
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout 仓库代码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 设置 Node.js 环境
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 安装 Markdown 转 HTML 的工具
      - name: Install dependencies
        run: |
          npm install marked

      # 生成 HTML 文件并创建索引
      - name: Generate HTML and Index
        run: |
          # 初始化 pages 目录
          mkdir -p pages

          # 遍历 posts 目录并生成 HTML
          declare -A post_details
          for dir in posts/*; do
            if [ -d "$dir" ]; then
              # 提取子目录名称作为文章标题
              post_name=$(basename "$dir")

              # 查找 Markdown 文件
              md_file=$(find "$dir" -name "*.md" | head -n 1)
              if [ -z "$md_file" ]; then
                echo "目录 $dir 中没有 Markdown 文件，跳过"
                continue
              fi

              # 获取描述
              description_file="$dir/d"
              if [ -f "$description_file" ]; then
                description=$(cat "$description_file" | tr '\n' ' ')
              else
                description=$(head -n 1 "$md_file" | tr '\n' ' ')
                description=$(echo "$description" | npx marked)
              fi
              description=${description:-"This is a blog post on $post_name."}

              # 获取关键词
              keywords_file="$dir/k"
              keywords=$(cat "$keywords_file" 2>/dev/null | tr '\n' ',' | sed 's/,$//')
              keywords=${keywords:-"leekblog,leek"}

              # 获取目录创建时间
              creation_time=$(stat -c '%Y' "$dir" 2>/dev/null || stat -f '%B' "$dir" 2>/dev/null)
              creation_time=${creation_time:-0}

              # 转换 Markdown 文件为 HTML
              post_content=$(cat "$md_file" | npx marked)

              # 创建 HTML 文件
              html_file="pages/${post_name}.html"
              echo "<!DOCTYPE html>
              <html lang='zh-CN'>
              <head>
                <meta charset='UTF-8'>
                <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                <title>$post_name | leek</title>
                <link rel='stylesheet' href='/css/main.css'>
                <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
                <meta name='description' content='$description'>
                <meta name='keywords' content='$keywords'>
              </head>
              <body>
                <header>
                  <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                  <p class='description'>我是一棵葱,站在风雨中</p>
                  <hr>
                </header>
                <main>
                  <span>Created on: $(date -d @$creation_time '+%Y-%m-%d')</span>
                  $post_content
                </main>
                <footer>
                  <a href='mailto:leekblog@proton.me'><span class='about'>about me</span></a>
                  <br><br>
                  <span>leek.blog &copy; 2024</span>
                </footer>
              </body>
              </html>" > "$html_file"

              echo "生成文章 HTML: $html_file"

              # 存储文章详情
              post_details["$creation_time"]="<a href='/pages/${post_name}.html'>$post_name</a>"
            fi
          done

          # 按创建时间排序并生成索引
          items_per_page=19
          index_count=0
          page_index=1
          post_list=""

          for time in $(echo "${!post_details[@]}" | tr ' ' '\n' | sort -nr); do
            post_list="${post_list}<li>${post_details[$time]}</li>"
            index_count=$((index_count + 1))

            if [ $((index_count % items_per_page)) -eq 0 ]; then
              if [ "$page_index" -eq 1 ]; then
                page_file="index.html"
              else
                page_file="index${page_index}.html"
              fi

              echo "<!DOCTYPE html>
              <html lang='zh-CN'>
              <head>
                <meta charset='UTF-8'>
                <meta name='viewport' content='width=device-width, initial-scale=1.0'>
                <link rel='stylesheet' href='/css/main.css'>
                <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
                <title>leek | Page $page_index</title>
              </head>
              <body>
                <header>
                  <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                  <p class='description'>我是一棵葱,站在风雨中</p>
                  <hr>
                </header>
                <main>
                  <ul>
                    $post_list
                  </ul>
                </main>
                <footer>
                  <a href='mailto:leekblog@proton.me'><span class='about'>about me</span></a>
                  <br><br>
                  <span>leek.blog &copy; 2024</span>
                </footer>
              </body>
              </html>" > "$page_file"

              echo "生成分页文件: $page_file"

              post_list=""
              page_index=$((page_index + 1))
            fi
          done

          # 处理最后一页
          if [ -n "$post_list" ]; then
            if [ "$page_index" -eq 1 ]; then
              page_file="index.html"
            else
              page_file="index${page_index}.html"
            fi

            echo "<!DOCTYPE html>
            <html lang='zh-CN'>
            <head>
              <meta charset='UTF-8'>
              <meta name='viewport' content='width=device-width, initial-scale=1.0'>
              <link rel='stylesheet' href='/css/main.css'>
              <link rel='shortcut icon' href='/favicon.ico' type='image/x-icon'>
              <title>leek | Page $page_index</title>
            </head>
            <body>
              <header>
                <a class='title' href='/'><p><span>www.</span>leek<span>.blog</span></p></a>
                <p class='description'>我是一棵葱,站在风雨中</p>
                <hr>
              </header>
              <main>
                <ul>
                  $post_list
                </ul>
              </main>
              <footer>
                <a href='mailto:leekblog@proton.me'><span class='about'>about me</span></a>
                <br><br>
                <span>leek.blog &copy; 2024</span>
              </footer>
            </body>
            </html>" > "$page_file"

            echo "生成分页文件: $page_file"
          fi

      # 提交并推送更改
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pages/*.html index*.html
          git commit -m "Update pages and index files"
          git push
