name: Blog Post Management

on:
  push:
    paths:
      - 'posts/**'
      - 'index.yml'

jobs:
  blog-management:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Node.js (for markdown conversion)
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Create pages directory if it doesn't exist
        run: |
          if [ ! -d "pages" ]; then
            mkdir pages
            echo "0" > pages/num
          fi

      - name: Get total number of posts
        run: |
          total_posts=$(find posts -type d | wc -l)
          echo "total_posts=$total_posts" >> $GITHUB_ENV
          
      - name: Set operation variable
        run: |
          current_num=$(cat pages/num)
          if [ "$total_posts" -gt "$current_num" ]; then
            echo "operation=add" >> $GITHUB_ENV
          elif [ "$total_posts" -lt "$current_num" ]; then
            echo "operation=delete" >> $GITHUB_ENV
          else
            echo "operation=unchanged" >> $GITHUB_ENV
          fi

      - name: Generate HTML pages for new posts
        if: env.operation == 'add'
        run: |
          for post_dir in posts/*; do
            post_name=$(basename "$post_dir")
            if [ ! -f "pages/$post_name.html" ]; then
              # Get the post details (title, content, etc.)
              title=$(basename "$post_dir")
              content=$(cat "$post_dir/*.md" | markdown)
              seo_desc=$(cat "$post_dir/desc" || head -n 1 "$post_dir/*.md")
              seo_keywords=$(cat "$post_dir/key" || echo "blog,keelblog,keel")
              year_month=$(cat "$post_dir/date" || echo "---- --/--")
              year=$(echo "$year_month" | awk '{print $1}')
              month=$(echo "$year_month" | awk '{print $2}')
              
              # Create HTML content
              echo "<html><head><meta name='description' content='$seo_desc'><meta name='keywords' content='$seo_keywords'></head><body>" > "pages/$post_name.html"
              echo "<header>$title</header>" >> "pages/$post_name.html"
              echo "<p>$content</p>" >> "pages/$post_name.html"
              echo "</body></html>" >> "pages/$post_name.html"
            fi
          done

      - name: Update index.html
        run: |
          html_header="<html><head><title>My Blog</title></head><body>"
          html_footer="</body></html>"
          
          # Generate article list
          article_list=""
          for post in $(find pages -type f -name "*.html" | sort); do
            title=$(basename "$post" .html)
            article_list="<a href='/pages/$title.html'><span>$title</span></a>" >> $article_list
          done

          # Write to index.html
          if [ ! -f "index.html" ]; then
            echo "$html_header" > index.html
            echo "$article_list" >> index.html
            echo "$html_footer" >> index.html
          else
            # Add pagination logic if there are more than 10 articles
            # Recursively check if index2.html, index3.html exist, etc.
            current_page=1
            while [ -f "index$current_page.html" ]; do
              current_page=$((current_page+1))
            done
            index_file="index$current_page.html"
            echo "$html_header" > $index_file
            echo "$article_list" >> $index_file
            echo "$html_footer" >> $index_file
          fi

      - name: Handle post deletion
        if: env.operation == 'delete'
        run: |
          for post_dir in posts/*; do
            post_name=$(basename "$post_dir")
            if [ -f "pages/$post_name.html" ]; then
              rm "pages/$post_name.html"
            fi
          done

      - name: Update num file
        run: |
          echo "$total_posts" > pages/num
